# ============================================================
#  S-SDLC — Pipeline de Segurança para Web App
#  Apresentação: Desenvolvimento Seguro e Ciclo de Vida
#
#  FLUXO:
#  install → build → [SAST + SCA] → test → DAST → deploy
# ============================================================

name: S-SDLC Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ════════════════════════════════════════════
  # JOB 1: INSTALL + BUILD
  # ════════════════════════════════════════════
  build:
    name: Install & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências (reproduzível)
        run: npm ci

      - name: Smoke test — app sobe sem erros
        run: |
          node src/index.js &
          sleep 3
          curl -f http://localhost:3000/health || exit 1
          kill %1

      # Cache node_modules para os jobs seguintes
      - name: Salvar cache de dependências
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ════════════════════════════════════════════
  # JOB 2: SAST — Análise Estática (White-box)
  #   Analisa o source sem rodar a app
  #   Ferramenta: Semgrep (OWASP rules)
  # ════════════════════════════════════════════
  sast:
    name: "SAST — Semgrep (White-box)"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write  # necessário para upload ao GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Executar Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/owasp-top-ten
            p/nodejs
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # opcional

      # 🔴 Quality Gate: o action falha automaticamente se encontrar issues

  # ════════════════════════════════════════════
  # JOB 3: SCA — Análise de Composição
  #   Verifica CVEs nas dependências (OWASP A06)
  #   Ferramenta: npm audit + Dependency Review
  # ════════════════════════════════════════════
  sca:
    name: "SCA — Dependency Audit (CVEs)"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write  # para comentar no PR
    steps:
      - uses: actions/checkout@v4

      # Bloqueia PRs com dependências de alto risco
      - name: Dependency Review (PRs apenas)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Restaurar cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: npm audit — HIGH/CRITICAL bloqueiam
        run: npm audit --audit-level=high

      - name: Salvar relatório SCA
        if: always()
        run: npm audit --json > sca-report.json || true

      - name: Upload relatório SCA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-report
          path: sca-report.json
          retention-days: 7

  # ════════════════════════════════════════════
  # JOB 4: SECRET SCANNING (Gitleaks)
  #   Evita que credenciais sejam commitadas
  # ════════════════════════════════════════════
  secret-scan:
    name: "Secret Scanning — Gitleaks"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # histórico completo para varredura

      - name: Gitleaks — detecta segredos no código
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 🔴 Bloqueia se encontrar chaves de API, tokens, senhas no código

  # ════════════════════════════════════════════
  # JOB 5: TEST — Unitários + Cobertura
  # ════════════════════════════════════════════
  test:
    name: "Tests — Jest + Coverage"
    runs-on: ubuntu-latest
    needs: [sast, sca, secret-scan]  # testes só rodam se segurança passou
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Restaurar cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Executar testes com cobertura
        run: npm test -- --ci --coverage

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ════════════════════════════════════════════
  # JOB 6: DAST — Análise Dinâmica (Black-box)
  #   Sobe a app e simula ataques reais com ZAP
  # ════════════════════════════════════════════
  dast:
    name: "DAST — OWASP ZAP (Black-box)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Restaurar cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Subir aplicação em background
        run: |
          npm start &
          sleep 5
          curl -f http://localhost:3000/health  # valida que está no ar

      - name: OWASP ZAP — Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:3000"
          rules_file_name: ".zap/rules.tsv"  # regras customizadas (opcional)
          fail_action: false           # 🟡 reporta mas não bloqueia (baseline)
          # Mude para: fail_action: true   quando quiser bloquear em MEDIUM+

      - name: Upload relatório DAST
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-zap-report
          path: report_html.html
          retention-days: 7

  # ════════════════════════════════════════════
  # JOB 7: DEPLOY — Staging (automático)
  #   Só executa após todos os gates passarem
  # ════════════════════════════════════════════
  deploy-staging:
    name: "Deploy → Staging"
    runs-on: ubuntu-latest
    needs: [test, dast]
    environment:
      name: staging
      url: https://staging.meuapp.com
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy para staging
        env:
          # ✅ Segredos vêm do GitHub Secrets — NUNCA hardcoded
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Iniciando deploy para staging..."
          # Aqui entraria o comando real: kubectl apply, helm upgrade, etc.

  # ════════════════════════════════════════════
  # JOB 8: DEPLOY — Produção (aprovação manual)
  # ════════════════════════════════════════════
  deploy-production:
    name: "Deploy → Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production          # 🔵 Requer revisor configurado no GitHub Environments
      url: https://meuapp.com
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy para produção
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Iniciando deploy para produção..."
